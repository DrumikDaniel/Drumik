<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drumik Animation Studio</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a0a2e, #0d0d1a);
            color: #f0e6f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a {
            color: #e400fd;
            text-decoration: none;
        }
        a:hover {
            color: #ff66ff;
        }
        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #e400fd;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff66ff;
        }

        .header {
            background: rgba(20, 10, 30, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(228, 0, 253, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 14px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-area img {
            height: 48px;
            width: auto;
            border-radius: 50%;
            background: rgba(228, 0, 253, 0.15);
            padding: 4px;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.2);
        }
        .logo-area .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #e400fd, #ff66ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(228, 0, 253, 0.3);
        }
        .logo-area .logo-text span {
            font-weight: 300;
            -webkit-text-fill-color: #f0e6f5;
            background: none;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-links a {
            padding: 8px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            color: #c4b5d0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            backdrop-filter: blur(4px);
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            background: rgba(228, 0, 253, 0.2);
            border-color: rgba(228, 0, 253, 0.4);
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.1);
        }
        .nav-links a.active {
            background: rgba(228, 0, 253, 0.25);
            border-color: #e400fd;
        }

        .main {
            flex: 1;
            padding: 40px 0 60px;
        }

        .view {
            display: none;
            animation: fadeUp 0.5s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: rgba(228, 0, 253, 0.2);
            box-shadow: 0 12px 48px rgba(228, 0, 253, 0.08);
        }

        /* ===== MODE SWITCH ===== */
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            width: fit-content;
        }
        .mode-switch button {
            padding: 8px 24px;
            border-radius: 26px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            background: transparent;
            color: #c4b5d0;
        }
        .mode-switch button.active {
            background: #e400fd;
            color: #fff;
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.2);
        }
        .mode-switch button:hover:not(.active) {
            background: rgba(228, 0, 253, 0.1);
            color: #fff;
        }

        /* ===== VIDEO MODE (YouTube-like) ===== */
        .video-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .video-controls .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 10px;
        }
        .video-controls .search-box input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 15px;
        }
        .video-controls .search-box input:focus {
            border-color: #e400fd;
            outline: none;
        }
        .video-controls .search-box button {
            padding: 8px 20px;
            border-radius: 30px;
            background: #e400fd;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s;
        }
        .video-controls .search-box button:hover {
            background: #ff66ff;
        }
        .video-controls .sort-select {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .video-controls .sort-select:focus {
            border-color: #e400fd;
            outline: none;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .video-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }
        .video-card:hover {
            transform: translateY(-4px);
            border-color: rgba(228, 0, 253, 0.2);
            box-shadow: 0 12px 40px rgba(228, 0, 253, 0.06);
        }
        .video-card .thumbnail {
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #e400fd;
            overflow: hidden;
        }
        .video-card .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-card .video-info {
            padding: 14px 18px 18px;
        }
        .video-card .video-info .title {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-card .video-info .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #b0a0b8;
        }
        .video-card .video-info .meta .series-name {
            color: #e400fd;
        }
        .video-card .video-info .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #f7c948;
        }
        .video-card .video-info .views {
            color: #6a5a70;
        }

        /* ===== SERIES MODE (classic) ===== */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
        }
        .series-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
        }
        .series-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(228, 0, 253, 0.3);
            box-shadow: 0 16px 60px rgba(228, 0, 253, 0.12);
        }
        .series-card .poster {
            aspect-ratio: 2/3;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            color: #e400fd;
            overflow: hidden;
        }
        .series-card .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .series-card .info {
            padding: 16px 18px 20px;
        }
        .series-card .info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
        }
        .series-card .info p {
            font-size: 14px;
            color: #b0a0b8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .series-card .info .series-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #6a5a70;
        }
        .series-card .info .series-meta .rating {
            color: #f7c948;
        }
        .series-card .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(228, 0, 253, 0.85);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #fff;
            text-shadow: 0 0 30px rgba(228, 0, 253, 0.15);
        }
        .section-title .accent {
            display: inline-block;
            width: 6px;
            height: 34px;
            border-radius: 4px;
            background: linear-gradient(180deg, #e400fd, #ff66ff);
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.4);
        }

        /* ===== SERIES DETAIL (shared) ===== */
        .series-detail-hero {
            padding: 32px 36px;
            margin-bottom: 32px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .series-detail-hero .poster-large {
            width: 200px;
            min-width: 160px;
            aspect-ratio: 2/3;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }
        .series-detail-hero .poster-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .series-detail-hero .info {
            flex: 1;
            min-width: 200px;
        }
        .series-detail-hero .info h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #e400fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .series-detail-hero .info .desc {
            color: #c4b5d0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .series-detail-hero .info .meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #a899b0;
            margin-bottom: 12px;
        }
        .series-detail-hero .info .meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .series-detail-hero .info .rating-block {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .series-detail-hero .info .rating-block .stars {
            display: flex;
            gap: 4px;
        }
        .series-detail-hero .info .rating-block .stars .star {
            font-size: 24px;
            cursor: pointer;
            color: #6a5a70;
            transition: all 0.2s;
        }
        .series-detail-hero .info .rating-block .stars .star.active {
            color: #f7c948;
        }
        .series-detail-hero .info .rating-block .stars .star:hover {
            transform: scale(1.2);
        }
        .series-detail-hero .info .rating-block .rating-text {
            font-size: 15px;
            color: #b0a0b8;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            color: #c4b5d0;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .back-btn:hover {
            background: rgba(228, 0, 253, 0.1);
            color: #fff;
            border-color: rgba(228, 0, 253, 0.3);
        }

        .season-block {
            margin-bottom: 32px;
        }
        .season-block .season-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border-radius: 18px 18px 0 0;
            border-bottom: 1px solid rgba(228, 0, 253, 0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .season-block .season-header:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .season-block .season-header h4 {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
            color: #fff;
        }
        .season-block .season-header .toggle-icon {
            font-size: 20px;
            transition: transform 0.3s;
            color: #e400fd;
        }
        .season-block .season-header .toggle-icon.open {
            transform: rotate(180deg);
        }

        .season-block .episodes-vertical {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border-radius: 0 0 18px 18px;
            padding: 12px 0;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.4s ease;
            padding: 0 0;
        }
        .season-block .episodes-vertical.open {
            max-height: 4000px;
            opacity: 1;
            padding: 12px 0 18px;
        }

        .season-block .episodes-horizontal {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border-radius: 0 0 18px 18px;
            padding: 16px 20px;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            padding-bottom: 12px;
        }
        .season-block .episodes-horizontal::-webkit-scrollbar {
            height: 4px;
        }
        .season-block .episodes-horizontal::-webkit-scrollbar-thumb {
            background: #e400fd;
            border-radius: 10px;
        }

        .episode-horizontal-item {
            flex: 0 0 160px;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
        }
        .episode-horizontal-item:hover {
            border-color: rgba(228, 0, 253, 0.3);
            transform: scale(1.02);
            background: rgba(228, 0, 253, 0.05);
        }
        .episode-horizontal-item .icon {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 6px;
        }
        .episode-horizontal-item .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .episode-horizontal-item .title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .episode-horizontal-item .num {
            font-size: 11px;
            color: #e400fd;
            font-weight: 700;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 24px;
            border-radius: 10px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .episode-item:hover {
            background: rgba(228, 0, 253, 0.05);
        }
        .episode-item .num {
            font-weight: 700;
            color: #e400fd;
            font-size: 15px;
            min-width: 36px;
        }
        .episode-item .info {
            flex: 1;
        }
        .episode-item .info .title {
            font-weight: 600;
            color: #fff;
        }
        .episode-item .info .desc {
            font-size: 13px;
            color: #b0a0b8;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .episode-item .info .episode-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #6a5a70;
            margin-top: 2px;
        }
        .episode-item .duration {
            font-size: 13px;
            color: #887a90;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 30px;
        }
        .episode-item .play-btn {
            background: #e400fd;
            color: #fff;
            border-radius: 30px;
            padding: 4px 18px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.25s;
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.2);
        }
        .episode-item .play-btn:hover {
            background: #ff66ff;
            transform: scale(1.04);
            box-shadow: 0 0 30px rgba(228, 0, 253, 0.3);
        }

        /* ===== PLAYER ===== */
        .player-wrapper {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .player-wrapper video {
            width: 100%;
            display: block;
            background: #000;
            aspect-ratio: 16/9;
            max-height: 70vh;
            object-fit: contain;
        }
        .player-wrapper .iframe-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .player-wrapper .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .player-controls {
            padding: 16px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .player-controls .player-btn {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(228, 0, 253, 0.15);
            color: #e400fd;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid rgba(228, 0, 253, 0.2);
        }
        .player-controls .player-btn:hover {
            background: rgba(228, 0, 253, 0.3);
            color: #fff;
        }
        .player-controls .player-btn.active {
            background: #e400fd;
            color: #fff;
            box-shadow: 0 0 20px rgba(228, 0, 253, 0.3);
        }
        .player-controls .label {
            font-size: 12px;
            color: #6a5a70;
            margin-right: 4px;
        }

        .player-info {
            padding: 20px 28px;
        }
        .player-info h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
        }
        .player-info .sub {
            color: #b0a0b8;
            font-size: 15px;
        }
        .player-info .player-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 13px;
            color: #6a5a70;
        }

        /* ===== PEDIA ===== */
        .pedia-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .pedia-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px 26px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
            cursor: pointer;
        }
        .pedia-card:hover {
            transform: translateY(-4px);
            border-color: rgba(228, 0, 253, 0.2);
            box-shadow: 0 12px 40px rgba(228, 0, 253, 0.06);
        }
        .pedia-card .cat {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e400fd;
            margin-bottom: 6px;

    <footer class="footer">
        <div class="container">&copy; 2026 Drumik Animation Studio. 袙褋械 锌褉邪胁邪 蟹邪褖懈褖械薪褘.</div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyCWCG3HBUOLF9GCRUqtdFFbUk4eC3LIn_8",
            authDomain: "video-hosting-a2ccf.firebaseapp.com",
            databaseURL: "https://video-hosting-a2ccf-default-rtdb.firebaseio.com",
            projectId: "video-hosting-a2ccf",
            storageBucket: "video-hosting-a2ccf.firebasestorage.app",
            messagingSenderId: "397541097498",
            appId: "1:397541097498:web:ec85cbb54f12f61d4991a3",
            measurementId: "G-P1LPL1J6CY"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== STATE =====
        const state = {
            currentView: 'series',
            series: {},
            articles: {},
            selectedSeriesId: null,
            playerData: null,
            currentPlayerIndex: 0,
            currentQuality: 'auto',
            mode: 'video', // 'video' or 'series'
            searchTerm: '',
            sortBy: 'popular',
        };

        // ===== DOM REFS =====
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const views = {
            series: $('#view-series'),
            player: $('#view-player'),
            pedia: $('#view-pedia'),
        };
        const navLinks = $$('.nav-links a');
        const homeSeriesGrid = $('#homeSeriesGrid');
        const seriesDetailContainer = $('#seriesDetailContainer');
        const playerContainer = $('#playerContainer');
        const pediaList = $('#pediaList');
        const pediaDetail = $('#pediaDetail');
        const toastContainer = $('#toastContainer');

        const videoGrid = $('#videoGrid');
        const videoSearch = $('#videoSearch');
        const sortSelect = $('#sortSelect');
        const searchBtn = $('#searchBtn');
        const modeSwitch = $('#modeSwitch');
        const videoMode = $('#videoMode');
        const seriesMode = $('#seriesMode');

        // ===== UTILITY =====
        function showToast(message, type = 'info') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            toastContainer.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateX(60px)';
                setTimeout(() => el.remove(), 400);
            }, 3500);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(timestamp) {
            if (!timestamp) return '袘械蟹 写邪褌褘';
            const d = new Date(timestamp);
            return d.toLocaleDateString('ru-RU', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getDeviceId() {
            let id = localStorage.getItem('drumik_device_id');
            if (!id) {
                id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('drumik_device_id', id);
            }
            return id;
        }

        function getRatedItems() {
            try {
                return JSON.parse(localStorage.getItem('drumik_rated') || '[]');
            } catch { return []; }
        }

        function saveRatedItems(items) {
            localStorage.setItem('drumik_rated', JSON.stringify(items));
        }

        function hasUserRated(id) {
            return getRatedItems().includes(id);
        }

        function markRated(id) {
            const items = getRatedItems();
            if (!items.includes(id)) {
                items.push(id);
                saveRatedItems(items);
            }
        }

        function getViewedEpisodes() {
            try {
                return JSON.parse(localStorage.getItem('drumik_viewed') || '[]');
            } catch { return []; }
        }

        function saveViewedEpisodes(ids) {
            localStorage.setItem('drumik_viewed', JSON.stringify(ids));
        }

        function hasViewedEpisode(id) {
            return getViewedEpisodes().includes(id);
        }

        function markEpisodeViewed(id) {
            const viewed = getViewedEpisodes();
            if (!viewed.includes(id)) {
                viewed.push(id);
                saveViewedEpisodes(viewed);
                return true;
            }
            return false;
        }

        // ===== NAVIGATION =====
        function navigateTo(view, data) {
            Object.values(views).forEach(v => v.classList.remove('active'));
            const target = views[view];
            if (target) target.classList.add('active');

            navLinks.forEach(a => {
                a.classList.toggle('active', a.dataset.view === view);
            });

            state.currentView = view;

            if (view === 'series') {
                if (data && data.seriesId) {
                    state.selectedSeriesId = data.seriesId;
                    renderSeriesDetail(data.seriesId);
                    homeSeriesGrid.style.display = 'none';
                    seriesDetailContainer.style.display = 'block';
                    // Switch to series mode automatically
                    setMode('series');
                } else {
                    homeSeriesGrid.style.display = 'grid';
                    seriesDetailContainer.style.display = 'none';
                    renderHome();
                    // Restore mode
                    setMode(state.mode || 'video');
                }
            } else if (view === 'player' && data) {
                state.playerData = data;
                state.currentPlayerIndex = 0;
                state.currentQuality = 'auto';
                renderPlayer(data);
            } else if (view === 'pedia') {
                renderPediaList();
                pediaDetail.style.display = 'none';
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        navLinks.forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const view = a.dataset.view;
                if (view === 'series') {
                    navigateTo('series');
                } else if (view === 'pedia') {
                    navigateTo('pedia');
                }
            });
        });

        $('#playerBackBtn').addEventListener('click', () => {
            if (state.selectedSeriesId) {
                navigateTo('series', { seriesId: state.selectedSeriesId });
            } else {
                navigateTo('series');
            }
        });

        // ===== MODE SWITCH =====
        function setMode(mode) {
            state.mode = mode;
            if (mode === 'video') {
                videoMode.style.display = 'block';
                seriesMode.style.display = 'none';
                renderVideoMode();
            } else {
                videoMode.style.display = 'none';
                seriesMode.style.display = 'block';
                renderHome(); // series grid
            }
            // update buttons
            document.querySelectorAll('#modeSwitch button').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });
        }

        document.querySelectorAll('#modeSwitch button').forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn.dataset.mode);
            });
        });

        // ===== DATA LOAD =====
        function loadData() {
            db.ref('series').on('value', (snap) => {
                state.series = snap.val() || {};
                if (state.currentView === 'series' && !state.selectedSeriesId) {
                    if (state.mode === 'video') {
                        renderVideoMode();
                    } else {
                        renderHome();
                    }
                } else if (state.currentView === 'series' && state.selectedSeriesId) {
                    renderSeriesDetail(state.selectedSeriesId);
                }
                // Update site views count (once per day)
                updateSiteViews();
            });

            db.ref('articles').on('value', (snap) => {
                state.articles = snap.val() || {};
                if (state.currentView === 'pedia') renderPediaList();
            });
        }

        // ===== SITE VIEWS =====
        function updateSiteViews() {
            const lastViewDate = localStorage.getItem('drumik_site_view_date');
            const today = new Date().toDateString();
            if (lastViewDate !== today) {
                localStorage.setItem('drumik_site_view_date', today);
                db.ref('siteViews').transaction((current) => {
                    return (current || 0) + 1;
                });
            }
        }

        // ===== RENDER: HOME (series mode) =====
        function renderHome() {
            const ids = Object.keys(state.series);
            if (ids.length === 0) {
                homeSeriesGrid.innerHTML =
                    `<div class="empty-state" style="grid-column:1/-1"><div class="icon">馃帪锔�</div><h3>袩芯泻邪 薪械褌 褋械褉懈邪谢芯胁</h3><p>小泻芯褉芯 蟹写械褋褜 锌芯褟胁褟褌褋褟 薪芯胁褘械 屑褍谢褜褌褎懈谢褜屑褘!</p></div>`;
                return;
            }

            let html = '';
            for (const id of ids) {
                const s = state.series[id];
                const seasonCount = s.seasons ? Object.keys(s.seasons).length : 0;
                const posterUrl = s.poster || '';
                const rating = getAverageRating(s.rating);
                const views = s.views || 0;
                const date = s.date ? formatDate(s.date) : '';

                html += `
                    <div class="series-card" data-id="${id}">
                        <div class="poster">
                            ${posterUrl ? `<img src="${posterUrl}" alt="${s.title}" loading="lazy" onerror="this.parentElement.innerHTML='馃幀'">` : '馃幀'}
                        </div>
                        <div class="info">
                            <h3>${escapeHtml(s.title || '袘械蟹 薪邪蟹胁邪薪懈褟')}</h3>
                            <p>${escapeHtml(s.description || '')}</p>
                            <div class="series-meta">
                                ${date ? `<span>馃搮 ${date}</span>` : ''}
                                <span class="rating">猸� ${rating.toFixed(1)}</span>
                                <span>馃憗锔� ${views}</span>
                            </div>
                        </div>
                        ${seasonCount > 0 ? `<div class="badge">${seasonCount} 褋械蟹芯薪邪</div>` : ''}
                    </div>
                `;
            }
            homeSeriesGrid.innerHTML = html;

            homeSeriesGrid.querySelectorAll('.series-card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    navigateTo('series', { seriesId: id });
                });
            });
        }

        // ===== RENDER: VIDEO MODE =====
        function renderVideoMode() {
            const searchTerm = state.searchTerm.toLowerCase().trim();
            const sortBy = state.sortBy;

            // Collect all episodes with metadata
            const episodes = [];
            for (const seriesId in state.series) {
                const series = state.series[seriesId];
                if (!series.seasons) continue;
                for (const seasonId in series.seasons) {
                    const season = series.seasons[seasonId];
                    if (!season.episodes) continue;
                    for (const episodeId in season.episodes) {
                        const ep = season.episodes[episodeId];
                        episodes.push({
                            id: episodeId,
                            seriesId: seriesId,
                            seasonId: seasonId,
                            seriesTitle: series.title || '袘械蟹 薪邪蟹胁邪薪懈褟',
                            seasonNumber: season.seasonNumber || 0,
                            episodeNumber: ep.episodeNumber || 0,
                            title: ep.title || '袘械蟹 薪邪蟹胁邪薪懈褟',
                            description: ep.description || '',
                            icon: ep.icon || '',
                            date: ep.date || series.date || 0,
                            rating: ep.rating || { sum: 0, count: 0 },

        // ===== PLAYER =====
        function detectPlayerType(url) {
            if (!url) return 'none';
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('rutube.ru')) return 'rutube';
            if (url.includes('vkvideo.ru') || url.includes('vk.com/video')) return 'vk';
            if (url.includes('t.me') || url.includes('telegram.org')) return 'telegram';
            if (url.match(/\.(mp4|webm|ogg|mov|avi|mkv)$/i)) return 'direct';
            return 'iframe';
        }

        function getEmbedUrl(url, type) {
            switch (type) {
                case 'youtube': {
                    const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/);
                    if (match) {
                        return `https://www.youtube.com/embed/${match[1]}?autoplay=1&rel=0`;
                    }
                    return url;
                }
                case 'rutube': {
                    const match = url.match(/rutube\.ru\/video\/([a-f0-9]+)/);
                    if (match) {
                        return `https://rutube.ru/embed/${match[1]}/?autoplay=1`;
                    }
                    return url;
                }
                case 'vk': {
                    const match = url.match(/video-?(\d+)_(\d+)/);
                    if (match) {
                        const oid = '-' + match[1];
                        const id = match[2];
                        return `https://vk.com/video_ext.php?oid=${oid}&id=${id}&hd=2&autoplay=1`;
                    }
                    return url;
                }
                case 'telegram': {
                    return url;
                }
                default:
                    return url;
            }
        }

                        <div class="rating-block" style="margin-top:12px;">
                            <div class="stars" data-rate-id="episode_${episodeId}">
                                ${renderStarsHtml(epRating, `episode_${episodeId}`)}
                            </div>
                            <span class="rating-text">${epRating.toFixed(1)} (${episode.rating?.count || 0} 谐芯谢芯褋芯胁)</span>
                        </div>
                    </div>
                </div>
            `;

            playerContainer.innerHTML = html;

            const video = playerContainer.querySelector('video');
            if (video) {
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {});
                });
            }

            // Rating for episode
            const starsContainer = document.querySelector('.stars[data-rate-id="episode_' + episodeId + '"]');
            if (starsContainer) {
                const currentRating = getAverageRating(episode.rating);
                renderStars(starsContainer, currentRating, (value) => {
                    rateEpisode(seriesId, seasonId, episodeId, value);
                });
            }

            state._players = players;
            state._qualities = qualities;
            state._episodeData = { seriesId, seasonId, episodeId };
        }

        window.switchPlayer = function(index) {
            state.currentPlayerIndex = index;
            const data = state._episodeData;
            if (data) {
                renderPlayer(data);
            }
        };

        window.switchQuality = function(label) {
            state.currentQuality = label;
            const data = state._episodeData;
            if (data) {
                renderPlayer(data);
            }
        };

        // ===== PEDIA =====
        function renderPediaList() {
            const ids = Object.keys(state.articles);
            if (ids.length === 0) {
                pediaList.innerHTML =
                    `<div class="empty-state" style="grid-column:1/-1"><div class="icon">馃摎</div><h3>小褌邪褌械泄 锌芯泻邪 薪械褌</h3><p>小泻芯褉芯 胁 Drumik-锌械写懈懈 锌芯褟胁褟褌褋褟 锌械褉胁褘械 屑邪褌械褉懈邪谢褘!</p></div>`;
                pediaDetail.style.display = 'none';
                return;
            }

            ids.sort((a, b) => {
                const da = state.articles[a].createdAt || 0;
                const db = state.articles[b].createdAt || 0;
                return db - da;
            });

            let html = '';
            for (const id of ids) {
                const art = state.articles[id];
                const date = art.createdAt ? new Date(art.createdAt).toLocaleDateString('ru-RU') : '';
                html += `
                        <div class="pedia-card" data-id="${id}">
                            <div class="cat">${escapeHtml(art.category || '袨斜褖械械')}</div>
                            <h4>${escapeHtml(art.title || '袘械蟹 薪邪蟹胁邪薪懈褟')}</h4>
                            <p>${escapeHtml((art.content || '').substring(0, 180))}${(art.content || '').length > 180 ? '鈥�' : ''}</p>
                            ${date ? `<div class="date">馃搮 ${date}</div>` : ''}
                        </div>
                    `;
            }
            pediaList.innerHTML = html;
            pediaDetail.style.display = 'none';

            pediaList.querySelectorAll('.pedia-card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    renderPediaDetail(id);
                });
            });
        }

        function renderPediaDetail(articleId) {
            const art = state.articles[articleId];
            if (!art) {
                pediaDetail.innerHTML = `<div class="empty-state"><h3>小褌邪褌褜褟 薪械 薪邪泄写械薪邪</h3></div>`;
                pediaDetail.style.display = 'block';
                return;
            }
            const date = art.createdAt ? new Date(art.createdAt).toLocaleDateString('ru-RU') : '';
            const updated = art.updatedAt ? new Date(art.updatedAt).toLocaleDateString('ru-RU') : '';

            const contentHtml = renderPediaContent(art.content || '');

            pediaDetail.innerHTML = `
                    <div style="margin-bottom:16px;">
                        <button class="back-btn" id="pediaBackBtn">鈫� 袧邪蟹邪写 泻 褋锌懈褋泻褍</button>
                    </div>
                    <div class="pedia-detail">
                        <div class="cat">${escapeHtml(art.category || '袨斜褖械械')}</div>
                        <h1>${escapeHtml(art.title || '袘械蟹 薪邪蟹胁邪薪懈褟')}</h1>
                        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;font-size:13px;color:#6a5a70;">
                            ${date ? `<span>馃搮 袨锌褍斜谢懈泻芯胁邪薪芯: ${date}</span>` : ''}
                            ${updated && updated !== date ? `<span>鉁忥笍 袨斜薪芯胁谢械薪芯: ${updated}</span>` : ''}
                        </div>
                        <div class="content">${contentHtml}</div>
                    </div>
                `;
            pediaDetail.style.display = 'block';
            pediaList.style.display = 'none';

            document.getElementById('pediaBackBtn').addEventListener('click', () => {
                pediaDetail.style.display = 'none';
                pediaList.style.display = 'grid';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            pediaDetail.querySelectorAll('.episode-link').forEach(el => {
                el.addEventListener('click', () => {
                    const seriesId = el.dataset.seriesId;
                    const seasonId = el.dataset.seasonId;
                    const episodeId = el.dataset.episodeId;
                    if (seriesId && episodeId) {
                        navigateTo('player', { seriesId, seasonId, episodeId });
                    } else if (seriesId) {
                        navigateTo('series', { seriesId });
                    }
                });
            });
        }

        function renderPediaContent(content) {
            if (!content) return '';

            let html = escapeHtml(content);

            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');

            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');

            html = html.replace(/\{color:([^}]+)\}(.*?)\{\/color\}/g, '<span style="color:$1;">$2</span>');
            html = html.replace(/==(.*?)==/g, '<span class="highlight">$1</span>');
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            html = html.replace(/\[褝锌懈蟹芯写:([^:]+):([^:]*):([^\]]+)\](.*?)\[\/褝锌懈蟹芯写\]/g,
                '<span class="episode-link" data-series-id="$1" data-season-id="$2" data-episode-id="$3">$4</span>');

            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            html = html.replace(/!\[([^\]]*)\]\(([^)]+)(?:\s+align=(\w+))?\)/g,
                (match, alt, url, align) => {
                    const alignClass = align ? ` align-${align}` : '';
                    return `<img src="${url}" alt="${alt}" class="${alignClass}" loading="lazy" />`;
                });

            html = html.replace(/\{gallery\}(.*?)\{\/gallery\}/g, (match, urls) => {
                const images = urls.split(',').map(u => u.trim()).filter(u => u);
                if (images.length === 0) return '';
                return `<div class="gallery">${images.map(u => `<img src="${u}" loading="lazy" />`).join('')}</div>`;
            });

            html = html.replace(/\{table\}(.*?)\{\/table\}/gs, (match, tableData) => {
                try {
                    const data = JSON.parse(tableData);
                    if (!data || !data.rows) return '';
                    let tableHtml = '<table><thead><tr>';
                    if (data.headers) {
                        data.headers.forEach(h => {
                            const rowspan = h.rowspan || 1;
                            const colspan = h.colspan || 1;
                            const cls = (rowspan > 1 ? 'rowspan' : '') + (colspan > 1 ? ' colspan' : '');
                            tableHtml +=
                                `<th rowspan="${rowspan}" colspan="${colspan}" class="${cls}">${escapeHtml(String(h.text || ''))}</th>`;
                        });
                    }
                    tableHtml += '</tr></thead><tbody>';
                    data.rows.forEach(row => {
                        tableHtml += '<tr>';
                        row.forEach(cell => {
                            const rowspan = cell.rowspan || 1;
                            const colspan = cell.colspan || 1;
                            const cls = (rowspan > 1 ? 'rowspan' : '') + (colspan > 1 ? ' colspan' : '');
                            tableHtml +=
                                `<td rowspan="${rowspan}" colspan="${colspan}" class="${cls}">${escapeHtml(String(cell.text || ''))}</td>`;
                        });
                        tableHtml += '</tr>';
                    });
                    tableHtml += '</tbody></table>';
                    return tableHtml;
                } catch (e) {
                    return `<div style="color:#ff4444;padding:10px;">袨褕懈斜泻邪 褌邪斜谢懈褑褘</div>`;
                }
            });

            html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
            html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, (match) => {
                if (!match.includes('<ul>')) {
                    return `<ol>${match}</ol>`;
                }
                return match;
            });

            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p><(h[1-6]|blockquote|ul|ol|table|div|img)/g, '<$1');
            html = html.replace(/<\/(h[1-6]|blockquote|ul|ol|table|div)><\/p>/g, '</$1>');
            html = html.replace(/<p><div/g, '<div');
            html = html.replace(/<\/div><\/p>/g, '</div>');

            return html;
        }

        // ===== SEARCH & SORT =====
        videoSearch.addEventListener('input', () => {
            state.searchTerm = videoSearch.value;
            if (state.mode === 'video') renderVideoMode();
        });

        searchBtn.addEventListener('click', () => {
            state.searchTerm = videoSearch.value;
            if (state.mode === 'video') renderVideoMode();
        });

        sortSelect.addEventListener('change', () => {
            state.sortBy = sortSelect.value;
            if (state.mode === 'video') renderVideoMode();
        });

        // ===== INIT =====
        loadData();

        // Hash routing
        window.addEventListener('hashchange', () => {
            const hash = location.hash.slice(1);
            if (hash === 'pedia') navigateTo('pedia');
            else if (hash === 'series') navigateTo('series');
            else if (hash.startsWith('series/')) {
                const id = hash.split('/')[1];
                if (id) navigateTo('series', { seriesId: id });
            } else {
                navigateTo('series');
            }
        });

        const initHash = location.hash.slice(1);
        if (initHash === 'pedia') navigateTo('pedia');
        else if (initHash.startsWith('series/')) {
            const id = initHash.split('/')[1];
            if (id) navigateTo('series', { seriesId: id });
        } else {
            navigateTo('series');
        }

        document.getElementById('logoImg')?.addEventListener('error', function() {
            this.style.display = 'none';
        });

        console.log('馃殌 Drumik Studio 褋 褉械泄褌懈薪谐芯屑, 锌褉芯褋屑芯褌褉邪屑懈, 褉械卸懈屑邪屑懈 懈 写邪褌邪屑懈!');
    </script>
</body>
